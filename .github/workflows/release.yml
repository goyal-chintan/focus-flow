name: Release DMG

# Triggers when you push a version tag, e.g.:  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  build-and-release:
    # ⚠️  FocusFlow targets macOS 26 (Tahoe) and requires the macOS 26 SDK.
    #     Update this to `macos-26` (or whichever label GitHub assigns) once
    #     Tahoe runners are generally available.  Until then you can run this
    #     workflow on a self-hosted macOS 26 runner.
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Extract version from tag
        run: |
          # v1.2.3  →  1.2.3
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build release DMG
        run: |
          chmod +x Scripts/build-dmg.sh
          VERSION=${{ env.VERSION }} ./Scripts/build-dmg.sh

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FocusFlow ${{ env.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: Artifacts/FocusFlow-${{ env.VERSION }}.dmg
          body: |
            ## Install

            1. Download **FocusFlow-${{ env.VERSION }}.dmg** below
            2. Open it and drag **FocusFlow.app** → **Applications**
            3. Launch from Spotlight (⌘ Space → "FocusFlow")

            > **Requires macOS 26 (Tahoe) or later.**
